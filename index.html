<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Calculator</title>
  <link href="bootstrap.css" rel="stylesheet" type="text/css" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body data-bs-theme="light">
  <div class="loading">
    <div class="dark-light">
      <input type="checkbox" id="darkmode-toggle"/>
      <label for="darkmode-toggle">
        <img version="1.1" class="sun" src="sun-svgrepo-com.svg" />
        <img version="1.1" class="moon" src="moon-svgrepo-com (1).svg" />
      </label>
    </div>
    <div class="content">
      <div class="num-input"></div>
      <input class="num-output" type="text">
      <div id="history-screen" class="history-screen">
        <div id="history-content" class="history-content">
          <div class="calculate">50 * 2</div>
          <div class="results">100</div><hr />
        </div>
      </div>
      <div class="buttons container" style=" width:325px;">
        <div class="row">
          <div class="col-3 but C gray">C</div>
          <div class="col-3 but CE gray">()</div>
          <div class="col-3 but percent gray">%</div>
          <div class="col-3 but divide blue">/</div>
        </div>
        <div class="row">
          <div class="col-3 but seven dark">7</div>
          <div class="col-3 but eight dark">8</div>
          <div class="col-3 but nine dark">9</div>
          <div class="col-3 but multiple blue">*</div>
        </div>
        <div class="row">
          <div class="col-3 but four dark">4</div>
          <div class="col-3 but five dark">5</div>
          <div class="col-3 but six dark">6</div>
          <div class="col-3 but minus blue">-</div>
        </div>
        <div class="row">
          <div class="col-3 but one dark">1</div>
          <div class="col-3 but two dark">2</div>
          <div class="col-3 but three dark">3</div>
          <div class="col-3 but plus blue">+</div>
        </div>
        <div class="row">
          <div class="col-3 but dot dark">.</div>
          <div class="col-3 but zero dark">0</div>
          <div class="col-3 but delete dark">Del</div>
          <div class="col-3 but equal blue">=</div>
        </div>
      </div>
    </div>
  </div>
  <script src="bootstrap.js"></script>
  <script src="script.js"></script>
</body>

</html>
